AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: org.local.Main::handleRequest
      Runtime: provided.al2023
      CodeUri: .
      MemorySize: 128
      Timeout: 30
      Architectures:
        - arm64
