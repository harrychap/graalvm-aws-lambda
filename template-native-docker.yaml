AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  HelloWorldNativeDockerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      MemorySize: 128
      Timeout: 30
      Architectures:
        - arm64
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: native-docker
